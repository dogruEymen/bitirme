services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-academic_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-academic_platform}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MODEL_NAME=${MODEL_NAME:-gemma4:e4b}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-intfloat/multilingual-e5-base}
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - RAG_CANDIDATE_K=${RAG_CANDIDATE_K:-25}
      - RAG_RETRIEVAL_MODE=${RAG_RETRIEVAL_MODE:-hybrid}
      - RAG_VECTOR_TOP_K=${RAG_VECTOR_TOP_K:-25}
      - RAG_BM25_TOP_K=${RAG_BM25_TOP_K:-25}
      - RAG_FINAL_TOP_K=${RAG_FINAL_TOP_K:-5}
      - RAG_FUSION_METHOD=${RAG_FUSION_METHOD:-rrf}
      - RAG_RRF_K=${RAG_RRF_K:-60}
      - RAG_WEIGHTED_ALPHA=${RAG_WEIGHTED_ALPHA:-0.65}
      - RAG_BM25_INDEX_PATH=${RAG_BM25_INDEX_PATH:-exports/retrieval/articles_bm25.sqlite}
      - RAG_DEBUG_RETRIEVAL=${RAG_DEBUG_RETRIEVAL:-false}
      - RAG_RERANKER_ENABLED=${RAG_RERANKER_ENABLED:-true}
      - RAG_RERANKER_MODEL_NAME=${RAG_RERANKER_MODEL_NAME:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      - RAG_RERANKER_TOP_N=${RAG_RERANKER_TOP_N:-50}
      - CHAT_HISTORY_LIMIT=${CHAT_HISTORY_LIMIT:-12}
      - CHAT_SUMMARY_TRIGGER_MESSAGES=${CHAT_SUMMARY_TRIGGER_MESSAGES:-24}
    volumes:
      - ./exports/retrieval:/app/exports/retrieval:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  postgres_data:
